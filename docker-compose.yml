version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      
  # Il "postino" per le email
  rabbitmq:
    image: rabbitmq:3-management
    container_name: agenda-rabbitmq
    ports:
      - "5672:5672"   # Porta per le app Java
      - "15672:15672" # Dashboard Web (guest/guest)
    networks:
      - agenda-network