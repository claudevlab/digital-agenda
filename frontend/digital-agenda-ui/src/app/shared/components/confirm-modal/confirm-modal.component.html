<!-- Overlay scuro dietro il modal -->
<div class="modal-overlay" (click)="onCancel()">

  <!-- Blocco modale — stopPropagation evita che il click sul modal chiuda l'overlay -->
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <span class="modal-icon">⚠️</span>
      <h5>{{ title }}</h5>
    </div>

    <div class="modal-body">
      <p>{{ message }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline-secondary" (click)="onCancel()">
        {{ cancelLabel }}
      </button>
      <button class="btn" [ngClass]="confirmClass" (click)="onConfirm()">
        {{ confirmLabel }}
      </button>
    </div>

  </div>
</div>
