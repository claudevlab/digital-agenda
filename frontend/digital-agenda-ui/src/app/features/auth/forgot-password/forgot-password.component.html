<div class="login-container"> <!-- Uso la tua classe del login per mantenere lo stile -->
  <div class="login-card">
    
    <div class="text-center">
      <h2>Recupera Password</h2>
      <p>Inserisci la tua email per ricevere il link di reset.</p>
    </div>

    @if (successMessage()) {
      <div class="alert alert-success">{{ successMessage() }}</div>
    }
    @if (errorMessage()) {
      <div class="alert alert-danger">{{ errorMessage() }}</div>
    }

    <!-- Se c'è stato successo, nascondiamo il form -->
    @if (!successMessage()) {
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" class="form-control"
                 [class.is-invalid]="f.email.invalid && f.email.touched">
          
          @if (f.email.invalid && f.email.touched) {
            <div class="error-text text-danger mt-1">
              <small>Inserisci un'email valida.</small>
            </div>
          }
        </div>

        <button type="submit" [disabled]="isLoading()" class="btn btn-primary w-100 mt-3">
          @if (isLoading()) {
            <span>Invio in corso...</span>
          } @else {
            <span>Invia Link</span>
          }
        </button>
      </form>
    }

    <div class="mt-3 text-center border-top pt-3">
      <a routerLink="/login" class="text-decoration-none">Torna al Login</a>
    </div>

  </div>
</div>
